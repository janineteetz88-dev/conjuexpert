name: Sync Notion Tracker

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Freigegeben → live schalten + Notion aktualisieren
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: node scripts/publish-from-notion.mjs

      - name: Änderungen committen und pushen
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add src/data/clusters.js
          git diff --staged --quiet || git commit -m "auto: Freigegeben-Artikel live geschaltet"
          git diff HEAD~1..HEAD --name-only 2>/dev/null | grep clusters.js && git push || true

      - name: Notion-Tracker abgleichen
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: node scripts/sync-notion-tracker.mjs --create
