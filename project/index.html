<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ConjuExpert — Verb Conjugator</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#f5e4c3" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ConjuExpert" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --radius: 22px;
  --font-display: "Space Grotesk", system-ui, sans-serif;
  --font-body: "Space Grotesk", system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --gap: 17px;
  --pad: 20px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-body);
  background:
    radial-gradient(1200px 600px at 20% -10%, #ffe9f0 0%, transparent 55%),
    radial-gradient(1000px 600px at 110% 10%, #e6f0ff 0%, transparent 50%),
    #eef0f4;
  display: flex; align-items: center; justify-content: center;
  min-height: 100dvh;
  color: #14151a;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility;
}

/* ===== Theme tokens ===== */
#approot {
  --bg: #f3f4f8;
  --surface: #ffffff;
  --surface-2: #f7f8fb;
  --text: #14151a;
  --muted: #707888;
  --border: rgba(20, 22, 30, 0.08);
  --shadow: 0 18px 50px -22px rgba(30, 35, 60, 0.35);
  --shadow-sm: 0 6px 18px -10px rgba(30, 35, 60, 0.3);
}
#approot[data-theme="dark"] {
  --bg: #0a0c14;
  --surface: #141826;
  --surface-2: #0f1320;
  --text: #eef1fa;
  --muted: #8a92a8;
  --border: rgba(255, 255, 255, 0.09);
  --shadow: 0 24px 60px -24px rgba(0, 0, 0, 0.8);
  --shadow-sm: 0 8px 22px -12px rgba(0, 0, 0, 0.7);
}
#approot[data-theme="playful"] {
  --bg: #fff7fb;
  --surface: #ffffff;
  --surface-2: #fff0f6;
  --text: #1a1430;
  --muted: #7c6f95;
  --border: rgba(120, 60, 160, 0.12);
  --shadow: 0 22px 55px -22px rgba(150, 60, 160, 0.5);
  --shadow-sm: 0 8px 20px -12px rgba(150, 60, 160, 0.45);
}
#approot[data-accent="soft"] { --acc-sat: 0.78; }
#approot[data-accent="mono"] { --acc-sat: 0; }

#approot[data-font="space"] { --font-display: "Space Grotesk", sans-serif; --font-body: "Space Grotesk", sans-serif; }
#approot[data-font="sora"]  { --font-display: "Sora", sans-serif; --font-body: "Sora", sans-serif; }
#approot[data-font="jakarta"] { --font-display: "Plus Jakarta Sans", sans-serif; --font-body: "Plus Jakarta Sans", sans-serif; }

#approot[data-density="compact"] { --gap: 12px; --pad: 16px; }
#approot[data-density="comfy"]   { --gap: 22px; --pad: 26px; }

/* ===== Phone frame ===== */
.phone {
  width: 100%;
  max-width: 440px;
  height: 100dvh;
  max-height: 940px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  border-radius: 0;
  transition: background 0.4s;
}
@media (min-width: 480px) {
  .phone {
    border-radius: 40px;
    box-shadow: var(--shadow), 0 0 0 10px #0c0e16, 0 0 0 12px rgba(255,255,255,0.06);
    height: min(94dvh, 920px);
    overflow: hidden;
  }
}

/* ===== App bar ===== */
.appbar {
  padding: max(env(safe-area-inset-top), 16px) var(--pad) 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 5;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.appbar::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 3px;
  background: linear-gradient(90deg, #ff3b5c, #ff7a18, #ffc400, #34c759, #00bcd4, #0a84ff, #a557ff);
  opacity: var(--acc-sat, 1);
  filter: saturate(calc(var(--acc-sat, 1)));
}
#approot[data-accent="mono"] .appbar::after { background: var(--text); opacity: 0.25; }
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px;
  width: 34px; height: 34px; padding: 5px;
  background: var(--surface-2); border-radius: 11px; align-items: stretch;
  box-shadow: var(--shadow-sm);
}
.brand-mark i { display: block; border-radius: 3px; }
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-name { font-family: var(--font-display); font-weight: 600; font-size: 20px; letter-spacing: -0.02em; }
.brand-name b { font-weight: 700; background: linear-gradient(90deg, #0a84ff, #a557ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
#approot[data-accent="mono"] .brand-name b { background: none; color: var(--text); }
.brand-tag { font-size: 10.5px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; white-space: nowrap; }

/* ===== Language bar ===== */
.langbar {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  padding: 14px var(--pad);
  background: var(--surface);
}
.langbtn {
  position: relative; border: 1px solid var(--border); background: var(--surface-2);
  border-radius: 14px; padding: 9px 2px 8px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-family: var(--font-body); color: var(--muted);
  overflow: hidden; transition: transform 0.15s, border-color 0.2s, color 0.2s, background 0.2s;
}
.langbtn:active { transform: scale(0.95); }
.langstripe { position: absolute; top: 0; left: 0; right: 0; height: 4px; opacity: 0.55; transition: height 0.2s, opacity 0.2s; }
#approot[data-accent="mono"] .langstripe { background: var(--text) !important; opacity: 0.3; }
.langbtn.active {
  color: var(--text); border-color: color-mix(in srgb, var(--lc) 55%, transparent);
  background: color-mix(in srgb, var(--lc) 12%, var(--surface));
  box-shadow: 0 8px 22px -12px var(--lc);
}
.langbtn.active .langstripe { height: 6px; opacity: 1; }
.langflag { font-size: 20px; line-height: 1; margin-top: 4px; font-family: var(--font-display); font-weight: 700; }
.langname { font-size: 9.5px; font-weight: 500; letter-spacing: 0; margin-top: 1px; white-space: nowrap; }

/* ===== Tabs ===== */
.tabs { padding: 8px var(--pad) 12px; background: var(--surface); border-bottom: 1px solid var(--border); }
.tabs-track {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
}
.tab {
  border: 1.5px solid transparent; cursor: pointer;
  background: var(--surface-2); color: var(--muted);
  padding: 7px 4px 6px; border-radius: 12px; font-family: var(--font-display);
  font-weight: 600; font-size: 12px; letter-spacing: -0.01em;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  transition: color 0.18s, background 0.18s, border-color 0.18s, box-shadow 0.18s, transform 0.12s;
  white-space: nowrap; overflow: hidden; min-height: 46px;
}
.tab-icon { font-size: 11px; opacity: 0.7; line-height: 1; }
.tab:not(.active):hover { color: var(--text); border-color: color-mix(in srgb, var(--lang-color, #0a84ff) 30%, transparent); }
.tab:active { transform: scale(0.95); }
.tab.active {
  color: var(--text);
  background: color-mix(in srgb, var(--lang-color, #0a84ff) 12%, var(--surface));
  border-color: var(--lang-color, #0a84ff);
  box-shadow: 0 6px 16px -11px var(--lang-color, #0a84ff);
}
.tab.active .tab-icon { opacity: 1; color: var(--lang-color, #0a84ff); }
#approot[data-accent="mono"] .tab.active { border-color: var(--text); background: color-mix(in srgb, var(--text) 9%, var(--surface)); }
#approot[data-accent="mono"] .tab.active .tab-icon { color: var(--text); }

/* ===== Content ===== */
.offlinebar { background: color-mix(in srgb, #ff7a18 16%, var(--surface)); color: #b3540a; font-family: var(--font-display); font-weight: 600; font-size: 12.5px; text-align: center; padding: 7px 14px; border-bottom: 1px solid color-mix(in srgb, #ff7a18 30%, var(--border)); }
#approot[data-theme="dark"] .offlinebar { color: #ffb068; }
.content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; background: color-mix(in srgb, var(--lang-color, transparent) 8%, var(--bg)); transition: background 0.4s; }
.content::-webkit-scrollbar { width: 0; }
.view { padding: var(--pad) var(--pad) 40px; display: flex; flex-direction: column; gap: var(--gap); animation: fade 0.35s ease both; }
@media (prefers-reduced-motion: no-preference) {
  @keyframes fade { from { transform: translateY(7px); } to { transform: none; } }
}

/* ===== Input ===== */
.inputwrap { display: flex; flex-direction: column; gap: 10px; }
.inputfield {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 4px 6px 4px 14px;
  box-shadow: var(--shadow-sm); transition: border-color 0.2s, box-shadow 0.2s;
}
.inputfield:focus-within { border-color: #0a84ff; box-shadow: 0 0 0 4px rgba(10,132,255,0.12); }
.inputlead { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 0.02em; color: var(--lc, var(--muted)); background: color-mix(in srgb, var(--lc, var(--muted)) 14%, transparent); padding: 5px 9px; border-radius: 9px; flex: none; }
.inputfield input {
  flex: 1; border: 0; outline: 0; background: transparent; color: var(--text);
  font-family: var(--font-display); font-size: 18px; font-weight: 500; padding: 14px 0;
}
.inputfield input::placeholder { color: var(--muted); font-weight: 400; }
.clearbtn { border: 0; background: var(--surface-2); color: var(--muted); width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; line-height: 1; }
.cta {
  position: relative; border: 0; cursor: pointer; border-radius: var(--radius);
  padding: 16px; font-family: var(--font-display); font-weight: 700; font-size: 16px;
  color: #fff; overflow: hidden; letter-spacing: 0.01em;
  box-shadow: 0 14px 30px -12px rgba(120, 40, 200, 0.6);
  transition: transform 0.14s;
}
.cta:active { transform: scale(0.97); }
.cta-rainbow { position: absolute; inset: 0; background: linear-gradient(100deg, #ff3b5c, #ff7a18, #ffc400, #34c759, #00bcd4, #0a84ff, #a557ff); background-size: 220% 100%; animation: slide 6s linear infinite; }
#approot[data-accent="soft"] .cta-rainbow { filter: saturate(0.7); }
#approot[data-accent="mono"] .cta-rainbow { background: linear-gradient(100deg, #2b2f3a, #4a4f60); animation: none; }
@keyframes slide { to { background-position: 220% 0; } }
.cta-label { position: relative; z-index: 2; }

/* ===== Chips ===== */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  border: 1px solid var(--border); background: var(--surface); color: var(--muted);
  border-radius: 999px; padding: 7px 13px; font-size: 13px; font-family: var(--mono);
  cursor: pointer; transition: all 0.15s;
}
.chip:active { transform: scale(0.94); }
.chip:hover { color: var(--text); border-color: color-mix(in srgb, #0a84ff 40%, transparent); }

/* ===== Empty state ===== */
.emptystate { text-align: center; padding: 48px 20px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.emptystate-rings { display: flex; gap: 7px; margin-bottom: 14px; }
.emptystate-rings span { width: 12px; height: 12px; border-radius: 50%; animation: bounce 1.3s ease-in-out infinite; }
@keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-10px); opacity: 1; } }
.emptystate-title { font-family: var(--font-display); font-weight: 600; font-size: 18px; margin: 0; }
.emptystate-sub { color: var(--muted); font-size: 13.5px; margin: 0; max-width: 250px; line-height: 1.5; text-wrap: pretty; }

/* ===== Result ===== */
.errorbox { background: color-mix(in srgb, #ff3b5c 10%, var(--surface)); border: 1px solid color-mix(in srgb, #ff3b5c 35%, transparent); color: color-mix(in srgb, #ff3b5c 75%, var(--text)); border-radius: 14px; padding: 14px 16px; font-size: 14px; line-height: 1.5; }
.resultwrap { display: flex; flex-direction: column; gap: 12px; }
.resulthead {
  position: relative; background: var(--surface); border: 1px solid var(--border);
  border-left: 4px solid var(--lc); border-radius: var(--radius); padding: 15px 18px 13px;
  box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 2px;
}
.rh-top { display: flex; align-items: center; gap: 8px; }
.rh-lang { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 0.03em; color: var(--lc); background: color-mix(in srgb, var(--lc) 14%, transparent); padding: 4px 9px; border-radius: 7px; }
.rh-top .starbtn { margin-left: auto; width: 34px; height: 34px; }
.rh-verb { font-family: var(--font-display); font-weight: 700; font-size: 31px; letter-spacing: -0.02em; color: var(--text); margin: 8px 0 0; line-height: 1.04; }
.rh-meaning { display: inline-flex; align-items: baseline; gap: 8px; font-size: 14px; color: var(--muted); margin: 6px 0 0; }
.rh-meaning b { font-family: var(--font-display); font-weight: 600; font-size: 13.5px; color: var(--text); }
.rh-meaning b::after { content: "→"; color: var(--muted); margin-left: 8px; font-weight: 400; }
.rh-meaning em { font-style: normal; font-weight: 700; color: var(--lc, var(--text)); }
.rh-actions { display: flex; gap: 6px; margin-top: 13px; padding-top: 11px; border-top: 1px solid var(--border); }
.resulthead-sub { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 8px; }
.badge { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px; font-family: var(--mono); letter-spacing: 0.02em; }
.badge.reg { background: color-mix(in srgb, #34c759 16%, var(--surface)); color: #1a9b46; }
.badge.irr { background: color-mix(in srgb, #ff7a18 18%, var(--surface)); color: #d4660a; }
#approot[data-theme="dark"] .badge.reg { color: #4ade80; }
#approot[data-theme="dark"] .badge.irr { color: #ffa450; }

/* ===== Tense card ===== */
.tcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
.tcard-head { width: 100%; display: flex; align-items: center; gap: 12px; padding: 17px 18px; border: 0; background: transparent; cursor: pointer; font-family: var(--font-display); color: var(--text); }
.tcard-dot { width: 10px; height: 10px; border-radius: 3px; background: var(--dot, var(--tc)); box-shadow: 0 0 12px -2px var(--dot, var(--tc)); flex: none; }
#approot[data-accent="mono"] .tcard-dot { background: var(--muted); box-shadow: none; }
.tcard-title { flex: 1; text-align: left; font-weight: 600; font-size: 15.5px; }
.tcard-caret { font-size: 20px; color: var(--muted); width: 22px; text-align: center; }
.tcard-body { max-height: 0; overflow: hidden; transition: max-height 0.33s ease; }
.tcard.open .tcard-body { max-height: 1400px; }
.tcard-rows { overflow: hidden; }
.conjrow { display: flex; align-items: center; gap: 12px; padding: 13px 18px 13px 40px; border-top: 1px solid var(--border); }
.conjrow .pron { width: 96px; flex: none; color: var(--muted); font-size: 13px; }
.conjrow .form { font-family: var(--mono); font-weight: 600; font-size: 15px; color: var(--text); }

/* ===== Quiz ===== */
.scoreline { display: flex; align-items: center; gap: 9px; font-family: var(--font-display); font-size: 13px; color: var(--muted); padding: 2px 4px; }
.scoreline .sl-item b { color: var(--lc, var(--text)); font-weight: 700; }
.scoreline .sl-sep { opacity: 0.45; }
.scoreline .sl-streak { margin-left: auto; font-weight: 600; color: var(--text); }
.scorebar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.scorestat { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 12px 8px; text-align: center; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 1px; }
.scorestat b { font-family: var(--font-display); font-size: 22px; font-weight: 700; line-height: 1; }
.scorestat span { font-size: 11px; color: var(--muted); }
.scorestat label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px; }
.scorestat.streak b { background: linear-gradient(90deg, #ff7a18, #ff3b5c); -webkit-background-clip: text; background-clip: text; color: transparent; }

.quizcard { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 22px 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 16px; transition: border-color 0.3s; }
.quizcard.correct { border-color: color-mix(in srgb, #34c759 55%, transparent); }
.quizcard.wrong { border-color: color-mix(in srgb, #ff3b5c 55%, transparent); }
.quizcard.quizmodern { position: relative; overflow: hidden; gap: 13px; padding-top: 20px; }
.quizcard.quizmodern::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--lc); opacity: 0.9; }
.qm-top { display: flex; align-items: center; gap: 8px; }
.qm-star { margin-left: auto; width: 34px; height: 34px; }
.flashverb-link { border: 0; background: transparent; cursor: pointer; font: inherit; color: inherit; padding: 2px 6px; display: inline-flex; align-items: center; gap: 7px; border-radius: 10px; transition: background 0.15s, transform 0.12s; }
.flashverb-link:hover { background: color-mix(in srgb, var(--lc, #0a84ff) 9%, transparent); }
.flashverb-link:active { transform: scale(0.97); }
.flashverb-link .qm-study-ic { font-size: 0.6em; color: var(--lc, #0a84ff); opacity: 0.85; }
.qm-prompt { display: flex; flex-direction: column; align-items: center; gap: 11px; text-align: center; padding: 6px 0; }
.qm-mean { text-align: center; min-height: 20px; display: flex; gap: 8px; justify-content: center; align-items: baseline; font-size: 14.5px; color: var(--muted); margin-top: -2px; }
.qm-mean b { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--text); }
.qm-mean b::after { content: "→"; color: var(--muted); margin-left: 8px; font-weight: 400; }
.qm-mean em { font-style: normal; font-weight: 700; color: var(--lc); }
.qm-mean-ph { opacity: 0.3; }
.quizmeta { display: flex; gap: 7px; }
.quizpill { font-size: 11px; font-family: var(--mono); padding: 5px 11px; border-radius: 999px; background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); }
.quizpill.irr { background: color-mix(in srgb, #ff7a18 16%, var(--surface)); color: #d4660a; border-color: transparent; }
.quizprompt { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 6px 0; }
.quizverb { font-family: var(--font-display); font-weight: 700; font-size: 27px; letter-spacing: -0.02em; }
.quizverb-link { border: 0; background: transparent; cursor: pointer; color: inherit; padding: 2px 8px; display: inline-flex; align-items: center; gap: 7px; border-radius: 10px; transition: background 0.15s, transform 0.12s; }
.quizverb-link:hover { background: color-mix(in srgb, var(--lc, #0a84ff) 9%, transparent); }
.quizverb-link:active { transform: scale(0.97); }
.quizverb-link .qm-study-ic { font-size: 0.55em; color: var(--lc, #0a84ff); opacity: 0.85; }
.quizarrow { color: var(--muted); font-size: 20px; }
.quizpron { font-family: var(--font-display); font-weight: 600; font-size: 20px; color: var(--lc, #0a84ff); background: color-mix(in srgb, var(--lc, #0a84ff) 13%, transparent); padding: 4px 12px; border-radius: 10px; }
.quizinput input { width: 100%; border: 1.5px solid var(--border); background: var(--surface-2); border-radius: 14px; padding: 15px 16px; font-family: var(--mono); font-weight: 600; font-size: 17px; color: var(--text); outline: 0; transition: border-color 0.2s, box-shadow 0.2s; }
.quizinput input::placeholder { font-weight: 400; font-family: var(--font-body); color: var(--muted); }
.quizinput input:focus { border-color: var(--lc, #0a84ff); box-shadow: 0 0 0 4px color-mix(in srgb, var(--lc, #0a84ff) 14%, transparent); }
.quizinput input:disabled { opacity: 0.85; }
.feedback { font-size: 15px; font-weight: 600; font-family: var(--font-display); padding: 2px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.feedback.ok { color: #1a9b46; }
.feedback.no { color: color-mix(in srgb, #ff3b5c 80%, var(--text)); }

/* ===== Voice quiz mic ===== */

.wsent { line-height: 1.7; }

.wword { position: relative; cursor: pointer; border-radius: 5px; padding: 1px 2px; transition: background 0.12s; text-decoration: underline; text-decoration-style: dotted; text-decoration-color: color-mix(in srgb, var(--lc, #0a84ff) 50%, transparent); text-underline-offset: 3px; }

.tdaction:last-child { background: var(--surface-2); color: var(--muted); }
.tdaction:active { transform: scale(0.96); }
.tdlist { display: flex; flex-direction: column; gap: 3px; max-height: 320px; overflow-y: auto; }
.tditem { display: flex; align-items: center; gap: 10px; border: 0; background: transparent; border-radius: 10px; padding: 9px 10px; cursor: pointer; text-align: left; transition: background 0.12s; }
.tditem:hover { background: var(--surface-2); }
.tdcheck { flex: none; width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; }
.tditem.on .tdcheck { background: var(--cc); border-color: var(--cc); }
.tdlabel { flex: 1; font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--text); display: flex; align-items: baseline; gap: 8px; }
.tdhint { font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--muted); }
.tditem:not(.on) .tdlabel { color: var(--muted); }
.quizmodes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.qmode {
  display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer;
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px;
  padding: 12px 4px 10px; color: var(--muted); transition: transform 0.14s, border-color 0.18s, background 0.18s, color 0.18s, box-shadow 0.18s;
}
.qmode-ic { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: var(--surface-2); color: var(--muted); transition: background 0.18s, color 0.18s, transform 0.18s; }
.qmode-lb { font-family: var(--font-display); font-weight: 700; font-size: 12px; white-space: nowrap; letter-spacing: -0.01em; }
.qmode:hover { border-color: color-mix(in srgb, var(--mc) 45%, transparent); color: var(--text); }
.qmode:active { transform: scale(0.95); }
.qmode.on {
  color: #fff; border-color: transparent;
  background: linear-gradient(150deg, color-mix(in srgb, var(--mc) 88%, #fff) 0%, var(--mc) 100%);
  box-shadow: 0 10px 22px -12px var(--mc); transform: translateY(-1px);
}
.qmode.on .qmode-ic { background: rgba(255,255,255,0.22); color: #fff; }
#approot[data-accent="mono"] .qmode.on { background: var(--text); }
.quizintro-line { font-size: 13px; color: var(--muted); text-align: center; margin: 11px 0 2px; text-wrap: pretty; }
.tfdropsel { appearance: none; -webkit-appearance: none; cursor: pointer; border: 0; background: var(--lc, #0a84ff); color: #fff; border-radius: 999px; padding: 8px 30px 8px 14px; font-family: var(--font-display); font-weight: 700; font-size: 13px; box-shadow: 0 6px 14px -9px var(--lc, #0a84ff); }
.tfdropcaret { position: absolute; right: 12px; pointer-events: none; color: #fff; font-size: 10px; }
#approot[data-accent="mono"] .tfdropsel { background: var(--text); }
.qfilter-hint { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 2px; }
.mistdone { text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 26px 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.mistdone-ic { font-size: 38px; }
.mistdone h3 { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--text); margin: 2px 0 0; }
.mistdone p { font-size: 13.5px; color: var(--muted); margin: 0 0 8px; text-wrap: pretty; }
.mistdone .quizbtn { min-width: 60%; }
.mistbtn {
  display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; cursor: pointer;
  border: 1.5px solid color-mix(in srgb, var(--lc, #ff7a18) 40%, var(--border));
  background: color-mix(in srgb, var(--lc, #ff7a18) 11%, var(--surface));
  border-radius: 14px; padding: 12px 14px; transition: transform 0.12s, background 0.15s, border-color 0.15s;
}
.mistbtn:active { transform: scale(0.98); }
.mistbtn-ic { font-size: 16px; flex: none; color: var(--lc, #ff7a18); }
.mistbtn-tx { flex: 1; font-family: var(--font-display); font-weight: 600; font-size: 14.5px; color: var(--text); }
.mistbtn-n { flex: none; font-family: var(--font-display); font-weight: 700; font-size: 13px; color: #fff; background: var(--lc, #ff7a18); min-width: 24px; height: 24px; padding: 0 7px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
.mistbtn.on { background: color-mix(in srgb, var(--lc, #ff7a18) 18%, var(--surface)); border-color: var(--lc, #ff7a18); }
#approot[data-accent="mono"] .mistbtn { background: var(--surface-2); border-color: var(--border); }
#approot[data-accent="mono"] .mistbtn-n { background: var(--text); }

/* ===== Deconjugation banner ===== */
.deconj {
  position: relative; background: var(--surface);
  border: 1px solid var(--border); border-left: 4px solid var(--lc);
  border-radius: var(--radius); padding: 15px 18px 16px;
  box-shadow: var(--shadow-sm); overflow: hidden; opacity: 1;
}
@media (prefers-reduced-motion: no-preference) {
  .deconj { animation: fade 0.35s ease both; }
}
.deconj-eyebrow { display: flex; align-items: center; gap: 7px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 700; }
.deconj-turn { color: var(--lc); font-size: 14px; transform: translateY(0.5px); }
.deconj-form { font-family: var(--mono); font-weight: 700; font-size: 27px; letter-spacing: -0.01em; color: var(--text); margin: 7px 0 11px; }
.deconj-lines { display: flex; flex-direction: column; gap: 7px; }
.deconj-line {
  display: flex; align-items: center; gap: 9px; flex-wrap: wrap;
  border: 1px solid var(--border); background: var(--surface-2);
  border-radius: 12px; padding: 9px 12px; text-align: left;
  font-family: var(--font-body); color: var(--text); transition: border-color 0.15s, background 0.15s;
}
.deconj-line.on { border-color: color-mix(in srgb, var(--lc) 55%, transparent); background: color-mix(in srgb, var(--lc) 9%, var(--surface)); }
.deconj-line:not(:disabled):hover { border-color: color-mix(in srgb, var(--lc) 45%, transparent); }
.deconj-pron {
  font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--lc);
  background: color-mix(in srgb, var(--lc) 13%, transparent); padding: 3px 10px; border-radius: 8px; flex: none;
}
.deconj-tense { font-size: 14px; font-weight: 500; color: var(--text); }
.deconj-arrow { color: var(--muted); font-size: 14px; }
.deconj-inf-mini { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--text); }
.deconj-foot { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 13px; padding-top: 12px; border-top: 1px solid var(--border); }
.deconj-inf-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.deconj-inf-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; }
.deconj-inf { font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -0.01em; color: var(--text); }
.deconj-chips { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.deconj-chip {
  border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
  border-radius: 999px; padding: 7px 14px; font-family: var(--font-display); font-weight: 600; font-size: 14px;
  cursor: pointer; transition: all 0.15s;
}
.deconj-chip.on { color: #fff; background: var(--lc); border-color: transparent; box-shadow: 0 8px 18px -10px var(--lc); }
.deconj-chip:active { transform: scale(0.95); }
.deconj-fuzzy { font-size: 11.5px; color: var(--muted); font-style: italic; margin-left: auto; }

/* matched cell highlight in the result table */
.conjrow.matched { background: color-mix(in srgb, var(--tc, #0a84ff) 12%, transparent); box-shadow: inset 3px 0 0 var(--tc, #0a84ff); }
.conjrow.matched .pron { color: color-mix(in srgb, var(--tc, #0a84ff) 70%, var(--text)); font-weight: 600; }
.conjrow.matched .form { color: var(--text); }
#approot[data-accent="mono"] .conjrow.matched { background: color-mix(in srgb, var(--text) 8%, transparent); box-shadow: inset 3px 0 0 var(--muted); }

/* tweaks panel host adjustments */
body > .tweaks-panel, .tweaks-panel { font-family: var(--font-body); }
