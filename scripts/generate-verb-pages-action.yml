name: Generate verb pages

on:
  workflow_dispatch:
    inputs:
      pages_per_run:
        description: 'Pages to generate (0 = alle)'
        default: '0'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate verb pages
        env:
          PAGES_PER_RUN: ${{ github.event.inputs.pages_per_run || '0' }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/generate-verb-pages.mjs

      - name: Commit new pages
        run: |
          git config user.name "conjuexpert-bot"
          git config user.email "bot@conjuexpert.app"
          git add konjugation/ sitemap.xml scripts/verb-queue.json
          git diff --cached --quiet || git commit -m "chore: generate verb pages [skip ci]"
          git push
